<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Burco Inventory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0F172A;
      --surface:     #1E293B;
      --surface2:    #273548;
      --border:      #334155;
      --accent:      #3B82F6;
      --accent-glow: rgba(59,130,246,0.15);
      --accent-lite: #93C5FD;
      --text:        #F1F5F9;
      --text-dim:    #94A3B8;
      --text-muted:  #64748B;
      --green:       #22C55E;
      --red:         #EF4444;
      --row-odd:     #1E293B;
      --row-even:    #1A2536;
      --row-hover:   #273548;
      --row-sel:     rgba(59,130,246,0.12);
      --radius:      10px;
      --radius-sm:   6px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ── */
    .app { display: flex; flex-direction: column; min-height: 100vh; }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .logo-text h1 { font-size: 17px; font-weight: 700; line-height: 1.2; }
    .logo-text p  { font-size: 11px; color: var(--text-dim); margin-top: 1px; }

    .header-right { display: flex; align-items: center; gap: 10px; }

    .refresh-btn {
      display: flex; align-items: center; gap: 6px;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius-sm);
      padding: 8px 14px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .refresh-btn:hover  { background: #2563EB; }
    .refresh-btn:active { transform: scale(0.97); }
    .refresh-btn:disabled { background: var(--surface2); color: var(--text-muted); cursor: not-allowed; }
    .refresh-icon { font-size: 15px; transition: transform 0.5s; }
    .refresh-icon.spinning { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Main ── */
    main { flex: 1; padding: 20px; max-width: 1100px; margin: 0 auto; width: 100%; }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 8px;
      margin-bottom: 16px;
    }
    .stat-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text-dim);
    }
    .stat-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
    .stat-dot.loading { background: var(--accent); animation: pulse 1s ease-in-out infinite; }
    .stat-dot.error   { background: var(--red); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── Search ── */
    .search-wrap {
      position: relative; margin-bottom: 16px;
    }
    .search-icon {
      position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); font-size: 16px; pointer-events: none;
    }
    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      padding: 11px 40px 11px 40px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .search-clear {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 16px; padding: 4px;
      display: none; border-radius: 4px;
      transition: color 0.1s;
    }
    .search-clear:hover { color: var(--text); }
    .search-clear.visible { display: block; }

    /* ── Result count ── */
    .result-count {
      font-size: 12px; color: var(--text-muted);
      margin-bottom: 10px; padding-left: 2px;
    }

    /* ── Table wrapper ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    table {
      width: 100%; border-collapse: collapse;
      min-width: 560px;
    }
    thead th {
      background: var(--surface2);
      color: var(--accent-lite);
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.07em;
      padding: 11px 14px;
      text-align: left;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    thead th:hover { background: #2d3f57; }
    thead th.sorted-asc::after  { content: " ↑"; color: var(--accent); }
    thead th.sorted-desc::after { content: " ↓"; color: var(--accent); }
    th.qty, td.qty { text-align: right; }

    tbody tr {
      border-bottom: 1px solid rgba(51,65,85,0.5);
      transition: background 0.1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:nth-child(odd)  { background: var(--row-odd); }
    tbody tr:nth-child(even) { background: var(--row-even); }
    tbody tr:hover { background: var(--row-hover); }

    td {
      padding: 11px 14px;
      font-size: 14px;
      color: var(--text);
      vertical-align: middle;
    }
    td.burco  { font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--accent-lite); white-space: nowrap; }
    td.scn    { font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--text-dim); white-space: nowrap; }
    td.desc   { min-width: 200px; }
    td.qty    { font-weight: 600; white-space: nowrap; }
    td.qty.zero { color: var(--text-muted); }

    mark {
      background: rgba(59,130,246,0.3);
      color: var(--accent-lite);
      border-radius: 2px; padding: 0 1px;
    }

    /* ── Empty / error states ── */
    .state-box {
      text-align: center; padding: 60px 20px;
      color: var(--text-dim);
    }
    .state-box .icon { font-size: 40px; margin-bottom: 12px; }
    .state-box h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
    .state-box p  { font-size: 13px; max-width: 320px; margin: 0 auto; line-height: 1.6; }

    /* ── Footer ── */
    footer {
      text-align: center; padding: 16px;
      font-size: 12px; color: var(--text-muted);
      border-top: 1px solid var(--border);
    }

    /* ── Skeleton loader ── */
    .skeleton { animation: shimmer 1.4s ease-in-out infinite; }
    @keyframes shimmer {
      0%,100% { opacity: 0.4 } 50% { opacity: 0.9 }
    }
    .sk-row td { padding: 13px 14px; }
    .sk-bar {
      height: 12px; border-radius: 4px;
      background: var(--surface2);
      display: inline-block;
    }

    /* ── Mobile cards (< 600px) ── */
    @media (max-width: 599px) {
      main { padding: 14px; }
      header { padding: 12px 14px; }
      .logo-text p { display: none; }

      .table-wrap { border-radius: var(--radius); overflow: hidden; }
      .table-scroll { overflow-x: unset; }
      table, thead, tbody, th, td, tr { display: block; }
      thead tr { display: none; }

      tbody tr {
        border-radius: var(--radius-sm);
        margin-bottom: 10px;
        border: 1px solid var(--border);
        padding: 12px 14px;
        background: var(--surface) !important;
      }
      tbody tr:hover { background: var(--row-hover) !important; }

      td { padding: 3px 0; font-size: 14px; border: none; }
      td::before {
        content: attr(data-label);
        display: inline-block;
        font-size: 10px; font-weight: 600;
        text-transform: uppercase; letter-spacing: 0.06em;
        color: var(--text-muted);
        width: 90px; flex-shrink: 0;
      }
      td { display: flex; align-items: baseline; gap: 6px; }
      td.qty { text-align: left; }
      td.qty.zero { color: var(--text-muted); }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">📦</div>
      <div class="logo-text">
        <h1>Burco Inventory</h1>
        <p>Live from OneDrive · Read-only</p>
      </div>
    </div>
    <div class="header-right">
      <button class="refresh-btn" id="refreshBtn" onclick="loadInventory()">
        <span class="refresh-icon" id="refreshIcon">⟳</span>
        <span id="refreshLabel">Refresh</span>
      </button>
    </div>
  </header>

  <!-- Main -->
  <main>
    <!-- Stats -->
    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-dot loading" id="statusDot"></div>
        <span id="statusText">Loading inventory…</span>
      </div>
      <div class="stat-item" id="lastRefreshed" style="display:none">
        <span id="refreshTime"></span>
      </div>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input
        class="search-input"
        id="searchInput"
        type="search"
        placeholder="Search by part number, description, SCN…"
        oninput="filterTable()"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
      />
      <button class="search-clear" id="clearBtn" onclick="clearSearch()">✕</button>
    </div>

    <!-- Result count -->
    <div class="result-count" id="resultCount"></div>

    <!-- Table -->
    <div class="table-wrap">
      <div class="table-scroll">
        <table id="invTable">
          <thead>
            <tr>
              <th onclick="sortTable('Burco #')"    id="th-burco">Burco #</th>
              <th onclick="sortTable('SCN')"         id="th-scn">SCN</th>
              <th onclick="sortTable('Description')" id="th-desc" class="sorted-asc">Description</th>
              <th onclick="sortTable('Qty On Hand')" id="th-qty" class="qty">Qty On Hand</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <!-- skeleton -->
            <tr class="sk-row skeleton"><td><span class="sk-bar" style="width:70px"></span></td><td><span class="sk-bar" style="width:90px"></span></td><td><span class="sk-bar" style="width:220px"></span></td><td class="qty"><span class="sk-bar" style="width:40px"></span></td></tr>
            <tr class="sk-row skeleton"><td><span class="sk-bar" style="width:60px"></span></td><td><span class="sk-bar" style="width:100px"></span></td><td><span class="sk-bar" style="width:180px"></span></td><td class="qty"><span class="sk-bar" style="width:30px"></span></td></tr>
            <tr class="sk-row skeleton"><td><span class="sk-bar" style="width:80px"></span></td><td><span class="sk-bar" style="width:80px"></span></td><td><span class="sk-bar" style="width:260px"></span></td><td class="qty"><span class="sk-bar" style="width:50px"></span></td></tr>
            <tr class="sk-row skeleton"><td><span class="sk-bar" style="width:65px"></span></td><td><span class="sk-bar" style="width:95px"></span></td><td><span class="sk-bar" style="width:200px"></span></td><td class="qty"><span class="sk-bar" style="width:35px"></span></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <footer>Read-only view &nbsp;·&nbsp; Data sourced from OneDrive</footer>
</div>

<script>
  let allData      = [];
  let sortCol      = 'Description';
  let sortAsc      = true;
  const colKeys    = ['Burco #', 'SCN', 'Description', 'Qty On Hand'];
  const thIds      = { 'Burco #': 'th-burco', 'SCN': 'th-scn', 'Description': 'th-desc', 'Qty On Hand': 'th-qty' };

  async function loadInventory() {
    setLoading(true);
    try {
      const res  = await fetch('/api/inventory');
      const json = await res.json();
      if (!json.success) throw new Error(json.error || 'Unknown error');
      allData = json.data;
      document.getElementById('refreshTime').textContent = '↻ ' + json.refreshed;
      document.getElementById('lastRefreshed').style.display = 'flex';
      document.getElementById('statusDot').className = 'stat-dot';
      document.getElementById('statusText').textContent = json.count + ' items loaded';
      filterTable();
    } catch (err) {
      showError(err.message);
    } finally {
      setLoading(false);
    }
  }

  function setLoading(on) {
    const btn   = document.getElementById('refreshBtn');
    const icon  = document.getElementById('refreshIcon');
    const label = document.getElementById('refreshLabel');
    btn.disabled = on;
    icon.className = on ? 'refresh-icon spinning' : 'refresh-icon';
    label.textContent = on ? 'Loading…' : 'Refresh';
    if (on) {
      document.getElementById('statusDot').className = 'stat-dot loading';
      document.getElementById('statusText').textContent = 'Fetching latest data…';
    }
  }

  function showError(msg) {
    document.getElementById('statusDot').className = 'stat-dot error';
    document.getElementById('statusText').textContent = 'Failed to load';
    document.getElementById('tableBody').innerHTML = `
      <tr><td colspan="4" style="padding:0;border:none">
        <div class="state-box">
          <div class="icon">⚠️</div>
          <h3>Could not load inventory</h3>
          <p>${msg}<br><br>Check your OneDrive link and internet connection, then click Refresh.</p>
        </div>
      </td></tr>`;
    document.getElementById('resultCount').textContent = '';
  }

  function escape(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function highlight(text, term) {
    if (!term) return escape(text);
    const safe = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return escape(text).replace(new RegExp('(' + safe + ')', 'gi'), '<mark>$1</mark>');
  }

  function filterTable() {
    const term = document.getElementById('searchInput').value.trim().toLowerCase();
    document.getElementById('clearBtn').className = term ? 'search-clear visible' : 'search-clear';

    let filtered = term
      ? allData.filter(r => colKeys.some(k => r[k] && r[k].toLowerCase().includes(term)))
      : allData;

    filtered = sortData(filtered);
    renderRows(filtered, term);

    const total = allData.length;
    const shown = filtered.length;
    document.getElementById('resultCount').textContent =
      total === 0 ? '' : term ? `Showing ${shown} of ${total} items` : `${total} items`;
  }

  function sortData(data) {
    return [...data].sort((a, b) => {
      let av = (a[sortCol] || '').toString().toLowerCase();
      let bv = (b[sortCol] || '').toString().toLowerCase();
      if (sortCol === 'Qty On Hand') {
        av = parseFloat(av) || 0;
        bv = parseFloat(bv) || 0;
        return sortAsc ? av - bv : bv - av;
      }
      return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
    });
  }

  function renderRows(rows, term) {
    const tbody = document.getElementById('tableBody');
    if (rows.length === 0) {
      tbody.innerHTML = `
        <tr><td colspan="4" style="padding:0;border:none">
          <div class="state-box">
            <div class="icon">🔍</div>
            <h3>No results</h3>
            <p>No items match "<strong>${escape(term)}</strong>". Try a different search term.</p>
          </div>
        </td></tr>`;
      return;
    }
    tbody.innerHTML = rows.map(r => {
      const qty = r['Qty On Hand'];
      const qtyClass = (!qty || qty === '0' || qty === '0.0') ? 'qty zero' : 'qty';
      return `<tr>
        <td class="burco" data-label="Burco #">${highlight(r['Burco #'] || '', term)}</td>
        <td class="scn"   data-label="SCN">${highlight(r['SCN'] || '', term)}</td>
        <td class="desc"  data-label="Description">${highlight(r['Description'] || '', term)}</td>
        <td class="${qtyClass}" data-label="Qty On Hand">${highlight(qty || '', term)}</td>
      </tr>`;
    }).join('');
  }

  function sortTable(col) {
    if (sortCol === col) { sortAsc = !sortAsc; }
    else { sortCol = col; sortAsc = true; }
    // Update header classes
    Object.keys(thIds).forEach(k => {
      document.getElementById(thIds[k]).className = k === 'Qty On Hand' ? 'qty' : '';
    });
    const thEl = document.getElementById(thIds[col]);
    thEl.className = (col === 'Qty On Hand' ? 'qty ' : '') + (sortAsc ? 'sorted-asc' : 'sorted-desc');
    filterTable();
  }

  function clearSearch() {
    document.getElementById('searchInput').value = '';
    filterTable();
    document.getElementById('searchInput').focus();
  }

  // Load on start
  loadInventory();
</script>
</body>
</html>
